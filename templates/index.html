<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Academic Assistant</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container fade-in-up">

    <div class="header-wrapper">
        <h1 class="soothing-text">🌿 Smart Academic Assistant</h1>
        <button id="themeToggleBtn" class="theme-toggle" onclick="window.toggleTheme ? toggleTheme() : null" title="Toggle Light/Dark Mode">
            🌙
        </button>
    </div>

    <div class="cards-wrapper">
        <!-- PYQ Analyzer -->
        <div class="card soothing-card">
            <div class="card-header">
                <h2>📚 PYQ Predictor</h2>
                <p>We analyze past papers for you. Just select your semester and provide the syllabus.</p>
            </div>
            
            <div class="input-group">
                <label>Select Semester</label>
                <div class="custom-select-wrapper">
                    <select id="semester" class="custom-select">
                        <option value="semester_1">Semester 1</option>
                        <option value="semester_2">Semester 2</option>
                        <option value="semester_3">Semester 3</option>
                        <option value="semester_4">Semester 4</option>
                        <option value="semester_5">Semester 5</option>
                        <option value="semester_6">Semester 6</option>
                        <option value="semester_7">Semester 7</option>
                        <option value="semester_8">Semester 8</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Subject</label>
                <div class="custom-select-wrapper">
                    <select id="subject" class="custom-select">
                        <!-- Populated via Javascript -->
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Upload Syllabus (PDF or Image)</label>
                <div class="custom-file-upload">
                    <input type="file" id="syllabusFile" class="file-input" accept=".pdf, image/*">
                </div>
            </div>

            <button class="btn btn-peaceful" id="analyzeBtn" onclick="window.analyzePYQ ? analyzePYQ() : null">
                <span class="btn-text">✨ Predict Questions</span>
                <div class="loader" id="analyzeLoader"></div>
            </button>

            <div class="result-section">
                <h3>Predicted Questions</h3>
                <div id="result" class="result-box"></div>
            </div>
        </div>

        <!-- Marks Tabulator -->
        <div class="card soothing-card">
            <div class="card-header">
                <h2>📊 Marks Tabulator</h2>
                <p>Upload a photo of an answer sheet. We extract section-wise marks instantly into an Excel spreadsheet.</p>
            </div>
            
            <div class="input-group">
                <label>Upload Image</label>
                <div class="custom-file-upload">
                    <input type="file" id="imageFile" class="file-input" accept="image/*">
                </div>
            </div>

            <div style="display: flex; gap: 15px;">
                <button class="btn btn-peaceful-alt" id="scanBtn" onclick="window.scanImage ? scanImage() : null">
                    <span class="btn-text">📝 Extract to Excel</span>
                    <div class="loader" id="scanLoader"></div>
                </button>
                <a href="/download_excel" class="btn" style="background-color: #64748B; text-decoration: none; text-align: center; max-width: 140px;">
                    📥 Download
                </a>
            </div>

            <div class="result-section">
                <h3>Extracted Data</h3>
                <div id="ocrResult" class="result-box"></div>
            </div>
        </div>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
